services:
  db:
    # AlloyDB Omni for local dev (PostgreSQL-compatible)
    # Fallback: replace with pgvector/pgvector:pg17 if pull fails
    image: google/alloydbomni:latest
    container_name: hr-rag-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-hr_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hr_rag_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_rag}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hr_rag_data:
